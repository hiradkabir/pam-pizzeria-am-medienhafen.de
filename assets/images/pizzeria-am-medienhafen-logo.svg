<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-label="Pizzeria am Medienhafen — Düsseldorf, seit 1998">
  <title>Pizzeria am Medienhafen</title>

  <!-- Background -->
  <rect width="1200" height="1200" fill="#000000"/>

  <!-- "PIZZERIA" - large Didone-style serif, letterspaced caps -->
  <text x="600" y="560"
        text-anchor="middle"
        font-family="'Bodoni Moda', 'Bodoni 72', 'Didot', 'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-weight="500"
        font-size="190"
        letter-spacing="22"
        fill="#E8C896">PIZZERIA</text>

  <!-- Ornament: thin line + small diamond + thin line -->
  <g stroke="#E8C896" stroke-width="1.8" fill="#E8C896">
    <line x1="470" y1="635" x2="555" y2="635"/>
    <!-- Diamond marker -->
    <polygon points="600,623 612,635 600,647 588,635" fill="#E8C896" stroke="none"/>
    <line x1="645" y1="635" x2="730" y2="635"/>
  </g>

  <!-- "AM MEDIENHAFEN" - smaller serif caps, generous letterspacing -->
  <text x="600" y="725"
        text-anchor="middle"
        font-family="'Bodoni Moda', 'Bodoni 72', 'Didot', 'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-weight="400"
        font-size="58"
        letter-spacing="12"
        fill="#E8C896">AM MEDIENHAFEN</text>

  <!-- "Düsseldorf · Seit 1998" - small italic-leaning tagline -->
  <text x="600" y="785"
        text-anchor="middle"
        font-family="'Bodoni Moda', 'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-weight="400"
        font-style="normal"
        font-size="26"
        letter-spacing="2"
        fill="#C9A877">Düsseldorf · Seit 1998</text>
</svg>
